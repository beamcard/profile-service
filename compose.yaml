services:
  postgres:
    image: postgres:16-alpine
    container_name: beamcard-profile-db
    environment:
      POSTGRES_DB: beamcard_profile
      POSTGRES_USER: beamcard
      POSTGRES_PASSWORD: beamcard
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beamcard -d beamcard_profile"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
