spring:
  application:
    name: profile-service

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8070/.well-known/jwks.json}

beamcard:
  web:
    public-url: ${WEB_PUBLIC_URL:http://localhost:5173}
  avatar:
    bucket: ${AVATAR_BUCKET:beamcard-avatars}
    region: ${AVATAR_REGION:eu-central-1}
    endpoint: ${AVATAR_ENDPOINT:http://localhost:9000} # Local MinIO
    access-key: ${AVATAR_ACCESS_KEY:beamcard}
    secret-key: ${AVATAR_SECRET_KEY:beamcard-secret}
    path-style: ${AVATAR_PATH_STYLE:true}
    ensure-bucket: ${AVATAR_ENSURE_BUCKET:true}
    public-base-url: ${AVATAR_PUBLIC_BASE_URL:http://localhost:9000/beamcard-avatars}
    presign-ttl-seconds: 300
    max-size-bytes: 2097152 # 2 MB
    allowed-content-types: image/png,image/jpeg,image/webp
  award:
    max-size-bytes: ${AWARD_MAX_SIZE_BYTES:5242880} # 5 MB
    allowed-content-types: image/png,image/jpeg,image/webp

server:
  port: 8090

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

logging:
  level:
    com.beamcard.profile: DEBUG
    org.flywaydb: INFO
